apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.workflowSampleServices.loanProcessingAgent.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.workflowSampleServices.loanProcessingAgent.name }}
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.workflowSampleServices.loanProcessingAgent.name }}
spec:
  replicas: {{ .Values.workflowSampleServices.loanProcessingAgent.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.workflowSampleServices.loanProcessingAgent.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.workflowSampleServices.loanProcessingAgent.name }}
    spec:
{{- if .Values.workflowSampleServices.loanProcessingAgent.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.workflowSampleServices.loanProcessingAgent.imagePullSecret }}
{{- end }}
      containers:
        - name: {{ .Values.workflowSampleServices.loanProcessingAgent.name }}
          image: {{ .Values.workflowSampleServices.loanProcessingAgent.image }}
          imagePullPolicy: {{ .Values.workflowSampleServices.loanProcessingAgent.imagePullPolicy }}
          env:
            - name: CONDUCTOR_SERVER_URL
              value: "http://workflow-server:9010/workflow-server/api"
            - name: CONDUCTOR_SECURITY_ENABLED
              value: {{ .Values.workflowSampleServices.loanProcessingAgent.enable_security| quote }}
            - name: TOKEN_URL
              value: {{ .Values.workflowSampleServices.loanProcessingAgent.token_url }}
            - name: CLIENT_ID
              value: {{ .Values.workflowSampleServices.loanProcessingAgent.client_id }}
            - name: CLIENT_SECRET
              value: {{ .Values.workflowSampleServices.loanProcessingAgent.client_secret }}
          ports:
            - containerPort: 8002
          resources:
            requests:
              ephemeral-storage: 256Mi
            limits:
              ephemeral-storage: 5Gi
